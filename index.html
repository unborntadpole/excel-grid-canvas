<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
    <div id="grid-container" style="width: 100%; height: calc(100vh - 100px); overflow: auto; position: relative; border: 1px solid #cbd5e1;">
        <div id="grid-spacer" style="position: absolute; top: 0; left: 0; pointer-events: none;"></div>
        <canvas id="my-grid-canvas" style="position: sticky; top: 0; left: 0; display: block;"></canvas>
        <input id="grid-editor" type="text" style="position: absolute; display: none; border: 2px solid #217346; outline: none; font: 13px Segoe UI; padding: 0 4px; box-sizing: border-box; z-index: 10;" />
    </div>
    <br>
    <div id="selectionOutput" style="flex-direction: row; display: flex; justify-content: space-evenly;">
        <button><label for="loaded-file">Upload File</label></button>
        <input type="file" id="loaded-file" accept=".json" hidden>
        <span>Count: <span id="field-count"></span></span>
        <span>Min: <span id="field-min"></span></span>
        <span>Max: <span id="field-max"></span></span>
        <span>Sum: <span id="field-sum"></span></span>
        <span>Average: <span id="field-average"></span></span>
    </div>

    <script type="module" src="./src/script.ts"></script>
</body>
</html>
